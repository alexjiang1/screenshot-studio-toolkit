interface:
  display_name: "Screenshot Studio Pro"
  short_description: "Self-contained AI image generation toolkit with Banana model guidance"
  default_prompt: "Use $screenshot-studio-pro to generate App Store screenshots or batch images without opening the original web app. For iPhone 6.5-inch and 6.7-inch App Store screenshots, default to nano-banana-2 so 4K generation and multi-slice output follow the same path as the main app. Use nano-banana-fast only for single-image quick drafts, and keep nano-banana-pro as the backup option."
models:
  default_model: "nano-banana-2"
  available_models:
    - id: "nano-banana-2"
      priority: 1
      recommended_for: "App Store 6.5-inch and 6.7-inch generation, 4K generation, and any workflow that will be sliced into multiple final images"
    - id: "nano-banana-fast"
      priority: 2
      recommended_for: "single-image quick drafts"
    - id: "nano-banana-pro"
      priority: 3
      recommended_for: "backup option"
policy:
  allow_implicit_invocation: true
